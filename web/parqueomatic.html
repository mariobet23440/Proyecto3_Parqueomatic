<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parqueomatic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col text-center">
                <h1 class="display-4 text-primary fw-bold">Parqueomatic</h1>
                <p class="lead text-muted">Panel de control de estacionamiento en tiempo real</p>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0 text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col">Número de Parqueo</th>
                                <th scope="col">Estado</th>
                                <th scope="col">Última actualización</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-parqueos">
                            <tr id="parqueo-1">
                                <td class="fw-bold">1</td>
                                <td><span class="badge bg-success">Libre</span></td>
                                <td>12:00 PM</td>
                            </tr>
                            <tr id="parqueo-2">
                                <td class="fw-bold">2</td>
                                <td><span class="badge bg-danger">Ocupado</span></td>
                                <td>11:45 AM</td>
                            </tr>
                            <tr id="parqueo-3">
                                <td class="fw-bold">3</td>
                                <td><span class="badge bg-success">Libre</span></td>
                                <td>12:01 PM</td>
                            </tr>
                            <tr id="parqueo-4">
                                <td class="fw-bold">4</td>
                                <td><span class="badge bg-danger">Ocupado</span></td>
                                <td>10:30 AM</td>
                            </tr>
                            <tr id="parqueo-5">
                                <td class="fw-bold">5</td>
                                <td><span class="badge bg-danger">Ocupado</span></td>
                                <td>09:15 AM</td>
                            </tr>
                            <tr id="parqueo-6">
                                <td class="fw-bold">6</td>
                                <td><span class="badge bg-success">Libre</span></td>
                                <td>11:55 AM</td>
                            </tr>
                            <tr id="parqueo-7">
                                <td class="fw-bold">7</td>
                                <td><span class="badge bg-success">Libre</span></td>
                                <td>12:05 PM</td>
                            </tr>
                            <tr id="parqueo-8">
                                <td class="fw-bold">8</td>
                                <td><span class="badge bg-warning text-dark">Mantenimiento</span></td>
                                <td>08:00 AM</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
